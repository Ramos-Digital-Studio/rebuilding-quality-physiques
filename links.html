<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | TYFITNESS</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            /* 1. Added the Brand Photo Background with a dark overlay for readability */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('brand-banner.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .link-tree-container {
            max-width: 450px;
            width: 90%;
            margin: 2rem auto;
            text-align: center;
            padding: 2rem;
            background: rgba(17, 17, 17, 0.6); /* Semi-transparent card */
            backdrop-filter: blur(10px); /* Blurs the background photo behind the card */
            border-radius: 15px;
            border: 1px solid #333;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 1rem;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(66, 227, 245, 0.2);
        }

        .link-btn {
            display: block;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 1.1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid #444;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. Unified Hover Effect (Glow and Scale) to match the About Page */
        .link-btn:hover {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 5px 20px rgba(66, 227, 245, 0.4);
        }

        .highlight-btn {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="link-tree-container">
        <img src="ty-profile.jpg" alt="TYFITNESS" class="profile-pic">
        
        <h2 style="margin-bottom: 0.2rem; color: var(--text-main);">Coach Ty</h2>
        <p style="color: var(--accent-color); margin-bottom: 2rem; font-weight: bold; letter-spacing: 1px;">@tyfit101</p>

        <a href="contact.html" class="link-btn highlight-btn">Apply For 1-on-1 Coaching</a>
        <a href="index.html" class="link-btn">Visit Official Website</a>
        <a href="results.html" class="link-btn">Client Transformations</a>
        <a href="faq.html" class="link-btn">Coaching FAQ</a>
        
        <div style="margin-top: 2rem;">
             <a href="https://www.instagram.com/tyfit101" target="_blank" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Follow on Instagram</a>
        </div>
    </div>

</body>
</html>
