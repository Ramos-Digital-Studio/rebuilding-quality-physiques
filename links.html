<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | TYFITNESS</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .link-tree-container {
            max-width: 500px; /* Keeps it looking like a mobile app */
            margin: 4rem auto;
            text-align: center;
            padding: 0 20px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 1rem;
            object-fit: cover;
            background-color: #111; /* Placeholder color */
        }
        .link-btn {
            display: block;
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid #333;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .link-btn:hover {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
        .highlight-btn {
            background-color: var(--accent-color);
            color: #000;
        }
        .highlight-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(66, 227, 245, 0.4);
        }
    </style>
</head>
<body>

    <div class="link-tree-container">
        <img src="ty-profile.jpg" alt="TYFITNESS" class="profile-pic">
        
        <h2 style="margin-bottom: 0.2rem; color: var(--text-main);">Coach Ty</h2>
        <p style="color: var(--accent-color); margin-bottom: 2.5rem; font-weight: bold;">@tyfit101</p>

        <a href="contact.html" class="link-btn highlight-btn">Apply For 1-on-1 Coaching</a>
        
        <a href="index.html" class="link-btn">Visit Official Website</a>
        <a href="results.html" class="link-btn">Client Transformations</a>
        <a href="faq.html" class="link-btn">Coaching FAQ</a>
    </div>

</body>
</html>
